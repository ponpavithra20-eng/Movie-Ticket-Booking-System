<!DOCTYPE html>
<html>
<head>
    <title>Movie Ticket Booking</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: white;
            color: black;
            width: 360px;
            margin: auto;
            padding: 20px;
            border-radius: 12px;
        }

        select, input {
            width: 90%;
            padding: 8px;
            margin: 6px 0;
        }

        .seats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 10px 0;
        }

        .seat {
            padding: 8px;
            background: #ccc;
            cursor: pointer;
            border-radius: 5px;
            font-size: 12px;
        }

        .seat.selected {
            background: green;
            color: white;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
        }

        .book {
            background: #16a34a;
            color: white;
        }

        .reset {
            background: #dc2626;
            color: white;
        }

        #result {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Movie Ticket Booking System</h2>

<div class="container">

    <select id="movie">
        <option value="">Select Movie</option>
        <option value="Avengers">Avengers</option>
        <option value="Interstellar">Interstellar</option>
        <option value="Inception">Inception</option>
    </select>

    <select id="time">
        <option value="">Select Time</option>
        <option value="10AM">10 AM</option>
        <option value="2PM">2 PM</option>
        <option value="6PM">6 PM</option>
    </select>

    <input type="number" id="age" placeholder="Enter Age">

    <h4>Select Seats</h4>
    <div class="seats" id="seatContainer"></div>

    <h3 id="total">Total: ₹0</h3>

    <button class="book" onclick="book()">Book Ticket</button>
    <button class="reset" onclick="resetAll()">Reset</button>

    <div id="result"></div>

</div>

<script>
    let selectedSeats = [];

    // create seats
    let seatContainer = document.getElementById("seatContainer");

    for (let i = 1; i <= 10; i++) {
        let seat = document.createElement("div");
        seat.classList.add("seat");
        seat.innerText = i;

        seat.onclick = function () {
            if (selectedSeats.includes(i)) {
                selectedSeats = selectedSeats.filter(s => s !== i);
                seat.classList.remove("selected");
            } else {
                selectedSeats.push(i);
                seat.classList.add("selected");
            }
            updateTotal();
        };

        seatContainer.appendChild(seat);
    }

    function getPrice(age) {
        if (age < 12) return 100;
        if (age > 60) return 150;
        return 200;
    }

    function updateTotal() {
        let age = Number(document.getElementById("age").value);
        let price = getPrice(age || 0);
        let total = price * selectedSeats.length;

        document.getElementById("total").innerText =
            "Total: ₹" + total;
    }

    document.getElementById("age").oninput = updateTotal;

    function book() {
        let movie = document.getElementById("movie").value;
        let time = document.getElementById("time").value;
        let age = Number(document.getElementById("age").value);

        if (!movie || !time || !age || selectedSeats.length === 0) {
            document.getElementById("result").innerHTML =
                "⚠ Please fill all details!";
            return;
        }

        let price = getPrice(age);
        let total = price * selectedSeats.length;

        document.getElementById("result").innerHTML =
            "Movie: " + movie +
            "<br>Time: " + time +
            "<br>Seats: " + selectedSeats.join(", ") +
            "<br>Total: ₹" + total +
            "<br>Booking Confirmed!";
    }

    function resetAll() {
        selectedSeats = [];
        document.getElementById("movie").value = "";
        document.getElementById("time").value = "";
        document.getElementById("age").value = "";
        document.getElementById("result").innerHTML = "";
        document.getElementById("total").innerText = "Total: ₹0";

        document.querySelectorAll(".seat").forEach(s => {
            s.classList.remove("selected");
        });
    }
</script>

</body>
</html>
