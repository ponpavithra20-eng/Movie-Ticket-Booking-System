<!DOCTYPE html>
<html>
<head>
    <title>Movie Booking</title>

    <style>
        body {
            font-family: Arial;
            background: #0b1220;
            color: white;
            text-align: center;
        }

        .box {
            background: white;
            color: black;
            width: 380px;
            margin: 20px auto;
            padding: 15px;
            border-radius: 12px;
        }

        select, input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        .seats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin: 10px 0;
        }

        .seat {
            padding: 8px;
            background: #d1d5db;
            cursor: pointer;
            border-radius: 5px;
        }

        .seat.selected {
            background: #22c55e;
            color: white;
        }

        .seat.booked {
            background: #ef4444;
            cursor: not-allowed;
            color: white;
        }

        button {
            width: 95%;
            padding: 10px;
            margin: 5px;
            border: none;
            cursor: pointer;
        }

        .book { background: #16a34a; color: white; }
        .reset { background: #dc2626; color: white; }

        #ticket {
            margin-top: 10px;
            font-weight: bold;
        }

        .poster {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<h2>Movie Ticket Booking</h2>

<div class="box">

    <img id="poster" class="poster" src="https://via.placeholder.com/300x150" />

    <select id="movie" onchange="changeMovie()">
        <option value="">Select Movie</option>
        <option value="Avengers">Avengers</option>
        <option value="Inception">Inception</option>
        <option value="Interstellar">Interstellar</option>
    </select>

    <select id="time">
        <option value="">Select Time</option>
        <option>10AM</option>
        <option>2PM</option>
        <option>6PM</option>
    </select>

    <input type="number" id="age" placeholder="Enter Age">

    <h4>Select Seats</h4>
    <div class="seats" id="seatBox"></div>

    <h3 id="price">Total: ₹0</h3>

    <button class="book" onclick="bookTicket()">Book Ticket</button>
    <button class="reset" onclick="resetAll()">Reset</button>

    <div id="ticket"></div>

</div>

<script>
    let selected = [];
    let booked = [3, 7]; // already booked seats

    let seatBox = document.getElementById("seatBox");

    function createSeats() {
        seatBox.innerHTML = "";

        for (let i = 1; i <= 10; i++) {
            let seat = document.createElement("div");
            seat.innerText = i;
            seat.classList.add("seat");

            if (booked.includes(i)) {
                seat.classList.add("booked");
            }

            seat.onclick = function () {
                if (booked.includes(i)) return;

                if (selected.includes(i)) {
                    selected = selected.filter(s => s !== i);
                    seat.classList.remove("selected");
                } else {
                    selected.push(i);
                    seat.classList.add("selected");
                }

                updatePrice();
            };

            seatBox.appendChild(seat);
        }
    }

    createSeats();

    function getPrice(age) {
        if (age < 12) return 120;
        if (age > 60) return 150;
        return 200;
    }

    function updatePrice() {
        let age = Number(document.getElementById("age").value || 0);
        let base = getPrice(age);

        let subtotal = base * selected.length;
        let tax = subtotal * 0.05;
        let total = subtotal + tax;

        document.getElementById("price").innerText =
            "Total: ₹" + Math.round(total);
    }

    document.getElementById("age").oninput = updatePrice;

    function changeMovie() {
        let movie = document.getElementById("movie").value;
        let poster = document.getElementById("poster");

        if (movie === "Avengers") {
            poster.src = "https://via.placeholder.com/300x150/ff0000/ffffff?text=Avengers";
        }
        else if (movie === "Inception") {
            poster.src = "https://via.placeholder.com/300x150/0000ff/ffffff?text=Inception";
        }
        else if (movie === "Interstellar") {
            poster.src = "https://via.placeholder.com/300x150/00aa00/ffffff?text=Interstellar";
        }
    }

    function bookTicket() {
        let movie = document.getElementById("movie").value;
        let time = document.getElementById("time").value;
        let age = document.getElementById("age").value;

        if (!movie || !time || !age || selected.length === 0) {
            alert("Fill all details!");
            return;
        }

        let ticketID = "TID" + Math.floor(Math.random() * 100000);

        document.getElementById("ticket").innerHTML =
            "Ticket ID: " + ticketID +
            "<br>Movie: " + movie +
            "<br>Time: " + time +
            "<br>Seats: " + selected.join(", ") +
            "<br>Booking Confirmed!";
        
        booked = booked.concat(selected);
        selected = [];
        createSeats();
        updatePrice();
    }

    function resetAll() {
        selected = [];
        document.getElementById("movie").value = "";
        document.getElementById("time").value = "";
        document.getElementById("age").value = "";
        document.getElementById("ticket").innerHTML = "";
        document.getElementById("price").innerText = "Total: ₹0";
        createSeats();
    }
</script>

</body>
</html>
